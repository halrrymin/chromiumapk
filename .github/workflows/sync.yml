name: Sync Chromium APK

on:
  schedule:
    - cron: '0 8 */2 * *' # 每 2 天早上 8 点触发
  workflow_dispatch:

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE20: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip curl aapt

      - name: Get Latest Build Number from Official API
        id: chromium_build
        run: |
          echo "🌐 正在从 Chromium 官方解析服务获取最新 Android_Arm64 构建号..."
          
          # 直接向官方查询最新的准确构建号 (规避 GCS XML 分页坑)
          LATEST_BUILD=$(curl -s "https://download-chromium.appspot.com/rev/Android_Arm64")
          
          # 验证是否为纯数字
          if [[ ! "$LATEST_BUILD" =~ ^[0-9]+$ ]]; then
            echo "❌ 接口返回的构建号异常: $LATEST_BUILD ，尝试从备用 API 获取..."
            LATEST_BUILD=$(curl -s "https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/Android_Arm64%2FLAST_CHANGE?alt=media")
          fi
          
          if [ -z "$LATEST_BUILD" ]; then
            echo "❌ 无法获取有效的最新构建号！"
            exit 1
          fi
          
          echo "🔥 成功获取最新构建号: $LATEST_BUILD (预计对应 151+ 版本)"
          echo "build_num=$LATEST_BUILD" >> $GITHUB_OUTPUT

      - name: Download and Process ZIP
        run: |
          BUILD_NUM="${{ steps.chromium_build.outputs.build_num }}"
          ZIP_URL="https://storage.googleapis.com/chromium-browser-snapshots/Android_Arm64/${BUILD_NUM}/chrome-android.zip"
          
          echo "⬇️ 正在下载构建号为 ${BUILD_NUM} 的全新 ZIP 包..."
          curl -L -o "chrome-android.zip" "$ZIP_URL"
          
          echo "📦 正在解压..."
          unzip -q "chrome-android.zip"
          
          TARGET_APK=$(find . -name "ChromePublic.apk" | head -n 1)
          if [ -z "$TARGET_APK" ] || [ ! -f "$TARGET_APK" ]; then
            echo "❌ 未能在解压目录中找到 ChromePublic.apk！"
            exit 1
          fi
          
          mv "$TARGET_APK" "temp_target.apk"
          echo "✅ 成功提取临时的 ChromePublic.apk"

      - name: Parse Real Version with aapt
        id: parse_version
        run: |
          echo "📱 正在使用 aapt 解析 APK 内部的真实显示版本号..."
          REAL_VERSION=$(aapt dump badging temp_target.apk | grep "versionName" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p")
          
          if [ -z "$REAL_VERSION" ]; then
            echo "⚠️ aapt 提取失败，回退到构建号命名"
            REAL_VERSION="0.0.${{ steps.chromium_build.outputs.build_num }}"
          fi
          
          echo "✨ 提取出真实版本号: ${REAL_VERSION}"
          echo "real_version=${REAL_VERSION}" >> $GITHUB_OUTPUT
          
          # 重命名为标准的、能在前端正确排序的版本号格式
          mv temp_target.apk "chromium-${REAL_VERSION}.apk"

      - name: Check if Version Already Released
        id: check_release
        run: |
          VERSION="${{ steps.parse_version.outputs.real_version }}"
          if gh release view "v${VERSION}" --repo ${{ github.repository }} &>/dev/null; then
            echo "⏭️ 版本 v${VERSION} 已存在，跳过本次发布。"
            echo "should_upload=false" >> $GITHUB_OUTPUT
          else
            echo "✅ 发现全新大版本 v${VERSION}，准备上传！"
            echo "should_upload=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_UPLOAD_TOKEN }}

      - name: Create GitHub Release
        if: steps.check_release.outputs.should_upload == 'true'
        run: |
          VERSION="${{ steps.parse_version.outputs.real_version }}"
          BUILD_NUM="${{ steps.chromium_build.outputs.build_num }}"
          
          echo "🚀 正在发布最新 v${VERSION} 的 Github Release..."
          gh release create "v${VERSION}" "chromium-${VERSION}.apk" \
            --title "Chromium ${VERSION}" \
            --notes "自动同步最新版本。内部构建快照号: ${BUILD_NUM}"
          echo "🎉 Release 发布成功！"
        env:
          GH_TOKEN: ${{ secrets.GH_UPLOAD_TOKEN }}

      - name: Clean old releases (keep latest 3)
        env:
          GH_TOKEN: ${{ secrets.GH_UPLOAD_TOKEN }}
        run: |
          echo "🧹 检查历史 Release..."
          ALL_TAGS=$(gh release list --repo ${{ github.repository }} --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          TOTAL=$(echo "$ALL_TAGS" | wc -l)
          
          if [ "$TOTAL" -gt 3 ]; then
            KEEP=3
            DELETE_COUNT=$((TOTAL - KEEP))
            echo "⚠️ 保留最新 ${KEEP} 个，删除旧的 ${DELETE_COUNT} 个版本。"
            OLD_TAGS=$(echo "$ALL_TAGS" | tail -n +$((KEEP + 1)))
            for TAG in $OLD_TAGS; do
              echo "🗑️ 正在删除旧版本: $TAG"
              gh release delete "$TAG" --yes --cleanup-tag || echo "删除 $TAG 失败"
            done
          fi
